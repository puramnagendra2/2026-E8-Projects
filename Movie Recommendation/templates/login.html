<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Movie Recommendation System</title>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link rel="stylesheet" as="style" onload="this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?display=swap&family=Noto+Sans:wght@400;500;700;900&family=Public+Sans:wght@400;500;700;900">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
      body {
        font-family: "Public Sans", "Noto Sans", sans-serif;
      }
      .error-message {
        color: #e53e3e;
        font-size: 0.875rem;
        margin-top: 0.25rem;
      }
    </style>
  </head>
  <body class="bg-white">
    <div class="flex flex-col min-h-screen">
      <header class="flex items-center justify-between border-b border-[#f5f3f0] px-10 py-3">
        <div class="flex items-center gap-4 text-[#181611]">
          <div class="w-4 h-4">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <g clip-path="url(#clip0_6_330)">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor"></path>
              </g>
              <defs>
                <clipPath id="clip0_6_330"><rect width="48" height="48" fill="white"></rect></clipPath>
              </defs>
            </svg>
          </div>
          <h2 class="text-lg font-bold">
            <a class="text-[#181611]" href="/">Movie Recommender</a>
          </h2>
        </div>
        <div class="flex justify-end gap-8">
          <div class="flex items-center gap-9">
            <a class="text-sm font-medium text-[#181611]" href="/">Home</a>
            <a class="text-sm font-medium text-[#181611]" href="/about">About</a>
            <a class="text-sm font-medium text-[#181611]" href="/contact">Contact</a>
          </div>
        </div>
      </header>

      <main class="flex items-center justify-center flex-1 px-10 py-5">
        <div class="w-full max-w-md p-8 bg-white rounded-lg shadow-md">
          <h1 class="mb-6 text-2xl font-bold text-center text-[#181611]">Login to Your Account</h1>
          
          <!-- Error message display -->
          {% if error %}
          <div class="p-3 mb-4 text-sm text-red-700 bg-red-100 rounded-lg">
            {{ error }}
          </div>
          {% endif %}
          
          <form method="post" action="/login">
            <div class="mb-4">
              <label for="username" class="block mb-2 text-sm font-medium">Username</label>
              <input type="text" id="username" name="username" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-[#4746E5] focus:border-[#4746E5]" required>
            </div>
            
            <div class="mb-6">
              <label for="password" class="block mb-2 text-sm font-medium">Password</label>
              <input type="password" id="password" name="password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-[#4746E5] focus:border-[#4746E5]" required>
            </div>
            
            <button type="submit" class="w-full py-3 font-bold text-white bg-[#4746E5] rounded-lg hover:bg-[#e09a0d]">Login</button>
            <!--
            <div class="mt-4 text-center">
              <a href="#" class="text-sm text-[#4746E5] hover:underline">Forgot your password?</a>
            </div>
          -->
            <div class="mt-6 text-center">
              <p class="text-sm text-gray-600">Don't have an account? <a href="/signup" class="text-[#4746E5] hover:underline">Sign up</a></p>
            </div>
          </form>
        </div>
      </main>

      <footer class="py-10 text-center">
        <p class="text-[#8a7d60]">© 2025 Movie Recommender. All rights reserved.</p>
      </footer>
    </div>
  </body>
</html>
